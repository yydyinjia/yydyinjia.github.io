<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高一(5)班数学课点名系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 95%;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #4a6fc0;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        
        .header-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #ff7043;
            color: white;
        }
        
        .btn-primary:hover {
            background: #f4511e;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #26a69a;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #00897b;
            transform: translateY(-2px);
        }
        
        .content {
            display: flex;
            flex: 1;
            min-height: 600px;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .student-list {
            background: #f5f9ff;
            border-radius: 15px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .student-card {
            background: white;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 120px;
        }
        
        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .student-card.called {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        
        .student-card.absent {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        
        .student-card.highlight {
            animation: highlight 1s ease-in-out;
            background: #fff3e0;
            border: 2px solid #ff9800;
        }
        
        @keyframes highlight {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background: #bbdefb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1976d2;
        }
        
        .student-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
        
        .student-id {
            color: #757575;
            font-size: 0.8rem;
        }
        
        .control-panel {
            width: 350px;
            padding: 25px;
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .random-student {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .random-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 3px solid white;
        }
        
        .random-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .random-id {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .control-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .stats {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #ddd;
        }
        
        .stat-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .called-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .called-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f5f5f5;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 3px solid #4caf50;
        }
        
        .pulse {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* 提示框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            animation: modalAppear 0.5s;
        }
        
        @keyframes modalAppear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: #4a6fc0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }
        
        .modal-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }
        
        .modal-id {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .modal-btn {
            padding: 10px 25px;
            background: #4a6fc0;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .modal-btn:hover {
            background: #3a5fa0;
            transform: translateY(-2px);
        }
        
        .modal-btn-secondary {
            background: #26a69a;
        }
        
        .modal-btn-secondary:hover {
            background: #00897b;
        }
        
        @media (max-width: 1100px) {
            .content {
                flex-direction: column;
            }
            
            .control-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid #e0e0e0;
            }
            
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 10px;
            }
            
            .student-card {
                padding: 10px 5px;
                height: 110px;
            }
            
            .student-avatar {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            
            .student-name {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chalkboard-teacher"></i> 高一(5)班数学课点名系统</h1>
            <p>教师：ye | 班级：高一(5)班 | 日期：<span id="current-date"></span></p>
            <div class="header-controls">
                <button class="btn btn-primary" id="call-random">
                    <i class="fas fa-random"></i> 随机点名
                </button>
                <button class="btn btn-secondary" id="reset-all">
                    <i class="fas fa-redo"></i> 重置点名
                </button>
            </div>
        </header>
        
        <div class="content">
            <div class="main-content">
                <div class="student-list">
                    <h2><i class="fas fa-users"></i> 学生列表</h2>
                    <div class="student-grid" id="student-container">
                        <!-- 学生列表由JavaScript生成 -->
                    </div>
                </div>
            </div>
            
            <div class="control-panel">
                <div class="random-student" id="random-student">
                    <div class="random-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="random-name">点击"随机点名"</div>
                    <div class="random-id">开始选择学生</div>
                </div>
                
                <h3 class="control-title"><i class="fas fa-chart-bar"></i> 点名统计</h3>
                <div class="stats">
                    <div class="stat-item">
                        <span>总学生数:</span>
                        <span id="total-students">45</span>
                    </div>
                    <div class="stat-item">
                        <span>已点名:</span>
                        <span id="called-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span>未点名:</span>
                        <span id="uncalled-count">45</span>
                    </div>
                    <div class="stat-item">
                        <span>参与率:</span>
                        <span id="participation-rate">0%</span>
                    </div>
                </div>
                
                <h3 class="control-title"><i class="fas fa-history"></i> 最近点名</h3>
                <div class="called-list" id="called-list">
                    <div class="called-item">
                        <span>暂无点名记录</span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 点名提示框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="modal-name" id="modal-name">学生姓名</div>
            <div class="modal-id" id="modal-id">学号：</div>
            <p>已被选中回答问题</p>
            <div class="modal-buttons">
                <button class="modal-btn" id="modal-close">确定</button>
                <button class="modal-btn modal-btn-secondary" id="modal-another">再点一位</button>
            </div>
        </div>
    </div>

    <script>
        // 当前日期显示
        const dateElement = document.getElementById('current-date');
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        dateElement.textContent = now.toLocaleDateString('zh-CN', options);
        
        // 学生数据
        const students = [
            { id: "1", name: "陈梦灵", called: false },
{ id: "2", name: "陈睿祺", called: false },
{ id: "3", name: "冯思淼", called: false },
{ id: "4", name: "何伊一", called: false },
{ id: "5", name: "何怡葶", called: false },
{ id: "6", name: "蓝吴奕帆", called: false },
{ id: "7", name: "蓝馨悦", called: false },
{ id: "8", name: "雷丝淇", called: false },
{ id: "9", name: "雷欣怡", called: false },
{ id: "10", name: "李佳乐", called: false },
{ id: "11", name: "李俊钦", called: false },
{ id: "12", name: "李开阳", called: false },
{ id: "13", name: "李曼婷", called: false },
{ id: "14", name: "李奕霏", called: false },
{ id: "15", name: "梁琪淇", called: false },
{ id: "16", name: "刘朝科", called: false },
{ id: "17", name: "刘心悦", called: false },
{ id: "18", name: "马鹏镇", called: false },
{ id: "19", name: "潘俞汐", called: false },
{ id: "20", name: "邱芝怡", called: false },
{ id: "21", name: "饶嘉悦", called: false },
{ id: "22", name: "饶智成", called: false },
{ id: "23", name: "陶清源", called: false },
{ id: "24", name: "王巧霞", called: false },
{ id: "25", name: "王泽昊", called: false },
{ id: "26", name: "温雅婷", called: false },
{ id: "27", name: "吴亦岚", called: false },
{ id: "28", name: "吴卓轩", called: false },
{ id: "29", name: "肖海川", called: false },
{ id: "30", name: "谢家昊", called: false },
{ id: "31", name: "严诺琳", called: false },
{ id: "32", name: "颜榆航", called: false },
{ id: "33", name: "叶佳妮", called: false },
{ id: "34", name: "叶骏升", called: false },
{ id: "35", name: "叶诗祺", called: false },
{ id: "36", name: "叶芯如", called: false },
{ id: "37", name: "张望乙", called: false },
{ id: "38", name: "张雅婷", called: false },
{ id: "39", name: "张煜函", called: false },
{ id: "40", name: "章晨熙", called: false },
{ id: "41", name: "章诗雨", called: false },
{ id: "42", name: "赵佳毅", called: false },
{ id: "43", name: "赵婉婷", called: false },
{ id: "44", name: "周若然", called: false }
        ];
        
        const studentContainer = document.getElementById('student-container');
        const calledList = document.getElementById('called-list');
        const randomStudent = document.getElementById('random-student');
        const callRandomBtn = document.getElementById('call-random');
        const resetAllBtn = document.getElementById('reset-all');
        const modal = document.getElementById('modal');
        const modalName = document.getElementById('modal-name');
        const modalId = document.getElementById('modal-id');
        const modalClose = document.getElementById('modal-close');
        const modalAnother = document.getElementById('modal-another');
        
        let currentSelectedStudent = null;
        let highlightInterval = null;
        
        // 渲染学生列表
        function renderStudents() {
            studentContainer.innerHTML = '';
            students.forEach(student => {
                const card = document.createElement('div');
                card.className = `student-card ${student.called ? 'called' : ''}`;
                card.dataset.id = student.id;
                card.innerHTML = `
                    <div class="student-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="student-name">${student.name}</div>
                    <div class="student-id">${student.id}</div>
                `;
                studentContainer.appendChild(card);
            });
            
            updateStats();
        }
        
        // 更新统计信息
        function updateStats() {
            const total = students.length;
            const calledCount = students.filter(s => s.called).length;
            const uncalledCount = total - calledCount;
            const participationRate = Math.round((calledCount / total) * 100);
            
            document.getElementById('total-students').textContent = total;
            document.getElementById('called-count').textContent = calledCount;
            document.getElementById('uncalled-count').textContent = uncalledCount;
            document.getElementById('participation-rate').textContent = `${participationRate}%`;
        }
        
        // 随机选择动画效果
        function startSelectionAnimation() {
            // 清除之前的动画
            if (highlightInterval) clearInterval(highlightInterval);
            
            // 获取所有未点名的学生卡片
            const uncalledCards = Array.from(studentContainer.children).filter(card => {
                const id = card.dataset.id;
                const student = students.find(s => s.id === id);
                return student && !student.called;
            });
            
            if (uncalledCards.length === 0) return;
            
            let currentIndex = 0;
            
            // 先高亮所有卡片一次
            uncalledCards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('highlight');
                    setTimeout(() => card.classList.remove('highlight'), 200);
                }, index * 50);
            });
            
            // 然后随机选择几个卡片高亮
            setTimeout(() => {
                highlightInterval = setInterval(() => {
                    // 移除之前的高亮
                    uncalledCards.forEach(card => card.classList.remove('highlight'));
                    
                    // 随机选择一个新的卡片高亮
                    const randomIndex = Math.floor(Math.random() * uncalledCards.length);
                    uncalledCards[randomIndex].classList.add('highlight');
                    
                    currentIndex = randomIndex;
                }, 200);
            }, uncalledCards.length * 50 + 300);
            
            return uncalledCards;
        }
        
        // 停止选择动画并选择最终学生
        function stopSelectionAnimation(uncalledCards, selectedStudent) {
            if (highlightInterval) clearInterval(highlightInterval);
            
            // 找到选中学生的卡片
            const selectedCard = uncalledCards.find(card => card.dataset.id === selectedStudent.id);
            
            if (selectedCard) {
                // 移除所有高亮
                uncalledCards.forEach(card => card.classList.remove('highlight'));
                
                // 高亮选中的卡片
                selectedCard.classList.add('highlight');
                
                // 标记为已点名
                selectedStudent.called = true;
                
                // 更新显示
                renderStudents();
                
                // 显示随机选择的学生
                randomStudent.innerHTML = `
                    <div class="random-avatar pulse">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="random-name">${selectedStudent.name}</div>
                    <div class="random-id">${selectedStudent.id}</div>
                `;
                
                // 添加到最近点名列表
                const calledItem = document.createElement('div');
                calledItem.className = 'called-item';
                calledItem.innerHTML = `
                    <span>${selectedStudent.name} (${selectedStudent.id})</span>
                    <span>${new Date().toLocaleTimeString()}</span>
                `;
                
                // 如果第一条是提示信息，移除它
                if (calledList.firstChild.textContent.includes('暂无点名记录')) {
                    calledList.innerHTML = '';
                }
                
                calledList.prepend(calledItem);
                
                // 显示提示框
                modalName.textContent = selectedStudent.name;
                modalId.textContent = `学号：${selectedStudent.id}`;
                modal.style.display = 'flex';
                
                currentSelectedStudent = selectedStudent;
            }
        }
        
        // 随机点名功能
        callRandomBtn.addEventListener('click', () => {
            // 获取未点名的学生
            const uncalledStudents = students.filter(student => !student.called);
            
            if (uncalledStudents.length === 0) {
                alert('所有学生都已被点名！');
                return;
            }
            
            // 开始选择动画
            const uncalledCards = startSelectionAnimation();
            
            // 2秒后停止动画并选择学生
            setTimeout(() => {
                // 随机选择一名学生
                const randomIndex = Math.floor(Math.random() * uncalledStudents.length);
                const selectedStudent = uncalledStudents[randomIndex];
                
                // 停止动画并选择学生
                stopSelectionAnimation(uncalledCards, selectedStudent);
            }, 2000);
        });
        
        // 再点一位功能
        modalAnother.addEventListener('click', () => {
            modal.style.display = 'none';
            
            // 获取未点名的学生
            const uncalledStudents = students.filter(student => !student.called);
            
            if (uncalledStudents.length === 0) {
                alert('所有学生都已被点名！');
                return;
            }
            
            // 开始选择动画
            const uncalledCards = startSelectionAnimation();
            
            // 2秒后停止动画并选择学生
            setTimeout(() => {
                // 随机选择一名学生
                const randomIndex = Math.floor(Math.random() * uncalledStudents.length);
                const selectedStudent = uncalledStudents[randomIndex];
                
                // 停止动画并选择学生
                stopSelectionAnimation(uncalledCards, selectedStudent);
            }, 2000);
        });
        
        // 关闭提示框
        modalClose.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        // 重置功能
        resetAllBtn.addEventListener('click', () => {
            if (confirm('确定要重置所有点名记录吗？')) {
                students.forEach(student => student.called = false);
                renderStudents();
                randomStudent.innerHTML = `
                    <div class="random-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="random-name">点击"随机点名"</div>
                    <div class="random-id">开始选择学生</div>
                `;
                calledList.innerHTML = `
                    <div class="called-item">
                        <span>暂无点名记录</span>
                        <span></span>
                    </div>
                `;
                
                if (highlightInterval) clearInterval(highlightInterval);
            }
        });
        
        // 初始化页面
        renderStudents();
    </script>
</body>
</html>
