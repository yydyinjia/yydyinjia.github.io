<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
    <title>多轨迹展示系统</title>
    <link rel="stylesheet" href="https://cache.amap.com/lbs/static/main1119.css"/>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=bc41155797a057ed6fe198cc709f7f8d"></script>
    <script type="text/javascript" src="https://webapi.amap.com/loca?v=2.0.0&key=bc41155797a057ed6fe198cc709f7f8d"></script>
    <script type="text/javascript" src="https://cache.amap.com/lbs/static/addToolbar.js"></script>
    
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background-color: #f3f4f6;
        }
        
        /* 控制面板样式 */
        #controlPanel {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            background-color: white;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 50;
            overflow-y: auto;
            transition: transform 0.3s ease;
            transform: translateX(0);
        }
        
        .control-panel-closed {
            transform: translateX(100%);
        }
        
        .panel-header {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #165DFF;
            display: flex;
            align-items: center;
        }
        
        .panel-title i {
            margin-right: 6px;
        }
        
        .toggle-btn {
            margin-left: auto;
            color: #9ca3af;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        
        .panel-content {
            padding: 12px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        /* .form-label {
            display: block;
            font-size: 12px;
            color: #4b5563;
            margin-bottom: 6px;
            font-weight: 500;
        } */
        
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f9fafb;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            background-color: #f3f4f6;
            border-color: #9ca3af;
        }
        
        .upload-icon {
            font-size: 24px;
            color: #165DFF;
            margin-bottom: 6px;
        }
        
        .file-status {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 3px;
        }
        
        
        
        .btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background-color: #165DFF;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0d47a1;
        }
        
        .btn-secondary {
            background-color: #e5e7eb;
            color: #4b5563;
        }
        
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        
        .btn-icon {
            margin-right: 6px;
        }
        
        .section-title {
            font-size: 12px;
            color: #4b5563;
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        
        .section-count {
            margin-left: 8px;
            padding: 2px 6px;
            background-color: #e5e7eb;
            color: #4b5563;
            border-radius: 999px;
            font-size: 10px;
        }
        
        .path-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        
        .path-item {
            display: flex;
            align-items: center;
            padding: 6px;
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            margin-bottom: 6px;
            transition: background-color 0.3s ease;
        }
        
        .path-item:hover {
            background-color: #f9fafb;
        }
        
        .path-color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .path-info {
            flex: 1;
            min-width: 0;
        }
        
        .path-name {
            font-size: 12px;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        
        .path-meta {
            display: flex;
            align-items: center;
            font-size: 10px;
            color: #6b7280;
        }
        
        .sport-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 10px;
            margin-right: 4px;
        }
        
        .run-badge {
            background-color: #ffecf7;
            color: #b91c1c;
        }
        
        .walk-badge {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .ride-badge {
            background-color: #dbeafe;
            color: #0369a1;
        }
        
        .other-badge {
            background-color: #bbf7d0;
            color: #047857;
        }
        
        .delete-btn {
            color: #9ca3af;
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            color: #ef4444;
        }
        
        .legend {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            margin-top: 12px;
        }
        
        .legend-title {
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 6px;
        }
        
        .legend-items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            font-size: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            color: #4b5563;
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        
        /* 地图容器 */
        .map-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <!-- 右侧控制面板 -->
    <div id="controlPanel">
        <div class="panel-header">
            <h2 class="panel-title">
                <span class="upload-icon">📌</span>运动轨迹管理
                <button id="togglePanel" class="toggle-btn">→</button>
            </h2>
        </div>
        
        <div class="panel-content">
            <!-- 文件上传区域 -->
            <div class="form-group">
                <p class="file-status" id="fileStatus">点击上传或拖拽文件到此处</p>
                    
                <input type="file" id="fileInput" class="hidden" multiple accept=".gpx" />
                <button id="loadBtn" class="btn btn-primary">
                    <span class="btn-icon">🗺️</span>加载轨迹
                </button>
            </div>
            
            <!-- 路径列表 -->
            <div>
                <h3 class="section-title">
                    <span>📋</span>已加载轨迹
                    <span id="pathCount" class="section-count">0</span>
                </h3>
                <div id="pathList" class="path-list">
                    <div class="text-center text-gray-400 text-xs py-3">暂无轨迹数据</div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="form-group pt-2">
                <button id="clearBtn" class="btn btn-secondary">
                    <span class="btn-icon">🗑️</span>清除所有轨迹
                </button>
                <button id="fitBtn" class="btn btn-secondary">
                    <span class="btn-icon">🔍</span>适应所有轨迹
                </button>
            </div>
            
            <!-- 信息面板 -->
            <div class="legend">
                <h4 class="legend-title">运动类型颜色说明</h4>
                <div class="legend-items">
                    <div class="legend-item"><span class="legend-dot" style="background-color: #FF33FF;"></span><span>跑步 (Run)</span></div>
                    <div class="legend-item"><span class="legend-dot" style="background-color: #de4444;"></span><span>步行 (Walk)</span></div>
                    <div class="legend-item"><span class="legend-dot" style="background-color: #3333FF;"></span><span>骑行 (Ride)</span></div>
                    <div class="legend-item"><span class="legend-dot" style="background-color: #00FFFF;"></span><span>其他 (Other)</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 地图容器 -->
    <div id="container" class="map-container"></div>

    <script type="text/javascript">
        // 初始化地图
        const map = new AMap.Map('container', {
            mapStyle: 'amap://styles/whitesmoke',
            zoom: 15,
            center: [108.911181, 34.120504],
            resizeEnable: true,
            // features: ['bg', 'road']
        });

        // 运动类型到样式的映射
        const sportStyles = {
            run: { color: '#FF33FF', weight: 5, name: "跑步" },
            walk: { color: '#de4444', weight: 4, name: "步行" },
            ride: { color: '#3333FF', weight: 3, name: "骑行" },
            other: { color: '#00FFFF', weight: 4, name: "其他" }
        };

        let polylines = [];
        let pathFiles = [];

        // DOM元素
        const fileInput = document.getElementById('fileInput');
        const loadBtn = document.getElementById('loadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fitBtn = document.getElementById('fitBtn');
        const pathList = document.getElementById('pathList');
        const pathCount = document.getElementById('pathCount');
        const fileStatus = document.getElementById('fileStatus');
        const togglePanel = document.getElementById('togglePanel');
        const controlPanel = document.getElementById('controlPanel');

        // 控制面板切换
        togglePanel.addEventListener('click', () => {
            controlPanel.classList.toggle('control-panel-closed');
            togglePanel.textContent = controlPanel.classList.contains('control-panel-closed') ? '←' : '→';
        });

        // 加载按钮点击事件
        loadBtn.addEventListener('click', () => fileInput.click());

        // 文件选择变化事件
        fileInput.addEventListener('change', handleFileSelect);

        // 清除按钮点击事件
        clearBtn.addEventListener('click', () => {
            clearPolylines();
            updatePathList();
            fileStatus.textContent = '点击上传或拖拽文件到此处';
        });

        // 适应按钮点击事件
        fitBtn.addEventListener('click', () => polylines.length && map.setFitView(polylines));

        // 坐标转换函数
        function transformLat(lng, lat) {
            let ret = -100.0 + 2.0 * lng + 3.0 * lat + 0.2 * lat * lat + 0.1 * lng * lat + 0.2 * Math.sqrt(Math.abs(lng));
            ret += (20.0 * Math.sin(6.0 * lng * Math.PI) + 20.0 * Math.sin(2.0 * lng * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(lat * Math.PI) + 40.0 * Math.sin(lat / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(lat / 12.0 * Math.PI) + 320 * Math.sin(lat * Math.PI / 30.0)) * 2.0 / 3.0;
            return ret;
        }

        function transformLng(lng, lat) {
            let ret = 300.0 + lng + 2.0 * lat + 0.1 * lng * lng + 0.1 * lng * lat + 0.1 * Math.sqrt(Math.abs(lng));
            ret += (20.0 * Math.sin(6.0 * lng * Math.PI) + 20.0 * Math.sin(2.0 * lng * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(lng * Math.PI) + 40.0 * Math.sin(lng / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(lng / 12.0 * Math.PI) + 300.0 * Math.sin(lng / 30.0 * Math.PI)) * 2.0 / 3.0;
            return ret;
        }

        function wgs84ToGcj02(lng, lat) {
            if (outOfChina(lng, lat)) return [lng, lat];
            let dLat = transformLat(lng - 105.0, lat - 35.0);
            let dLng = transformLng(lng - 105.0, lat - 35.0);
            let radLat = lat / 180.0 * Math.PI;
            let magic = Math.sin(radLat);
            magic = 1 - 0.00669342162296594323 * magic * magic;
            let sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((6378245.0 * (1 - 0.00669342162296594323)) / (magic * sqrtMagic) * Math.PI);
            dLng = (dLng * 180.0) / (6378245.0 / sqrtMagic * Math.cos(radLat) * Math.PI);
            return [lng + dLng, lat + dLat];
        }

        function outOfChina(lng, lat) {
            return (lng < 72.004 || lng > 137.8347) || (lat < 0.8293 || lat > 55.8271);
        }

        // 处理文件选择
        function handleFileSelect(e) {
            const files = e.target.files;
            if (!files.length) return;
            
            fileStatus.textContent = `已选择 ${files.length} 个文件`;
            clearPolylines();
            
            const filePromises = Array.from(files).map(readGpxFile);
            
            Promise.all(filePromises).then(paths => {
                const validPaths = paths.filter(p => p && p.data && p.data.length > 1);
                
                if (validPaths.length > 0) {
                    pathFiles = validPaths;
                    createPolylines(validPaths);
                    updatePathList();
                    map.setFitView(polylines);
                    showNotification(`成功加载 ${validPaths.length} 条轨迹`);
                } else {
                    showNotification('未找到有效的轨迹数据', 'error');
                }
            }).catch(() => showNotification('加载轨迹失败，请检查文件格式', 'error'));
        }

        // 识别运动类型
        function detectSportType(type) {
            if (!type) return 'other';
            const lowerType = type.toLowerCase();
            if (lowerType.includes('run')) return 'run';
            if (lowerType.includes('walk')) return 'walk';
            if (lowerType.includes('ride') || lowerType.includes('cycle')) return 'ride';
            return 'other';
        }

        // 读取并解析GPX文件
        function readGpxFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const content = e.target.result;
                        const pathData = parseGpxContent(content);
                        
                        if (pathData && pathData.points && pathData.points.length > 1) {
                            const sportType = detectSportType(pathData.type);
                            resolve({
                                name: pathData.name || file.name,
                                sportType,
                                size: formatFileSize(file.size),
                                data: pathData.points,
                                info: {
                                    type: sportStyles[sportType].name,
                                    time: pathData.time, // 现在是 HH:mm:ss 格式
                                    pointCount: pathData.points.length
                                }
                            });
                        } else {
                            resolve(null);
                        }
                    } catch {
                        resolve(null);
                    }
                };
                reader.readAsText(file);
            });
        }

        

        // 解析GPX内容
        function parseGpxContent(content) {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(content, "text/xml");
                   
                const type = xmlDoc.querySelector("gpx > trk > type")?.textContent;
                
                let points = [];
                let firstTime = null;

                const trkpts = xmlDoc.querySelectorAll("gpx > trk > trkseg > trkpt");
                if (trkpts.length > 0) {
                    points = Array.from(trkpts).map(pt => {
                        const lon = parseFloat(pt.getAttribute("lon"));
                        const lat = parseFloat(pt.getAttribute("lat"));

                        // 获取每个轨迹点的时间
                        const timeNode = pt.querySelector("time");
                        const timeStr = timeNode?.textContent;

                        // 记录第一个轨迹点的时间
                        if (!firstTime && timeStr) {
                            firstTime = timeStr;
                        }

                        return wgs84ToGcj02(lon, lat);
                    });
                } 

                        // 使用第一个轨迹点的时间作为轨迹时间
                const name = firstTime ? formatDate(firstTime) : '未知日期';
                const time = firstTime ? formatTime(firstTime) : '未知时间';

                
                return { name, type, time, points };
            } catch {
                return null;
            }
        }






        // 新增时间格式化函数
        function formatDate(utcTime) {
            try {
                const date = new Date(utcTime);
                // 直接使用日期部分，不添加额外时区偏移
                const year = date.getUTCFullYear();
                const month = String(date.getUTCMonth() + 1).padStart(2, '0');
                const day = String(date.getUTCDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch {
                return utcTime;
            }
        }

        function formatTime(utcTime) {
            try {
                const date = new Date(utcTime);
                // 转换为北京时间 (UTC+8)
                const hours = String((date.getUTCHours() + 8) % 24).padStart(2, '0');
                const minutes = String(date.getUTCMinutes()).padStart(2, '0');
                const seconds = String(date.getUTCSeconds()).padStart(2, '0');
                return `${hours}:${minutes}:${seconds}`;
            } catch {
                return utcTime;
            }
        }

        // 创建并添加折线
        function createPolylines(paths) {
            paths.forEach((path, index) => {
                const style = sportStyles[path.sportType];
                
                const polyline = new AMap.Polyline({
                    path: path.data,
                    strokeColor: style.color,
                    strokeWeight: style.weight,
                    strokeOpacity: 0.8,
                    lineJoin: 'round',
                    lineCap: 'round',
                    zIndex: 50 - (index % 10),
                    isOutline: true,
                    outlineColor: '#FFFFFF',
                    borderWeight: 1,
                    extData: { 
                        fileName: path.name,
                        styleName: style.name,
                        pathInfo: path.info
                    }
                });
                
                polyline.setMap(map);
                polylines.push(polyline);
                
                polyline.on('click', () => showPathInfo(index));
            });
        }

        // 清除现有折线
        function clearPolylines() {
            polylines.forEach(p => p.setMap(null));
            polylines = [];
            pathFiles = [];
        }

        // 更新路径列表
        function updatePathList() {
            pathList.innerHTML = '';
            pathCount.textContent = pathFiles.length;
            
            if (pathFiles.length === 0) {
                pathList.innerHTML = '<div class="text-center text-gray-400 text-xs py-3">暂无轨迹数据</div>';
                return;
            }
            
            pathFiles.forEach((path, index) => {
                const style = sportStyles[path.sportType];
                const badgeClass = `${path.sportType}-badge`;
                
                const pathItem = document.createElement('div');
                pathItem.className = 'path-item';
                pathItem.innerHTML = `
                    <div class="path-color-dot" style="background-color: ${style.color}"></div>
                    <div class="path-info">
                        <p class="path-name">${path.name}</p>
                        <div class="path-meta">
                            <span class="sport-badge ${badgeClass}">${path.info.type}</span>
                            <p>${path.info.time}</p>
                        </div>
                    </div>
                    <button class="delete-btn" data-index="${index}">×</button>
                `;
                pathList.appendChild(pathItem);
                
                pathItem.querySelector('.delete-btn').addEventListener('click', e => {
                    e.stopPropagation();
                    removePath(parseInt(e.target.getAttribute('data-index')));
                });
                
                pathItem.addEventListener('click', () => showPathInfo(index));
            });
        }

        // 移除单条路径
        function removePath(index) {
            if (index >= 0 && index < polylines.length) {
                polylines[index].setMap(null);
                polylines.splice(index, 1);
                pathFiles.splice(index, 1);
                
                updatePathList();
                
                if (polylines.length > 0) {
                    map.setFitView(polylines);
                }
                
                showNotification(`已移除路径: ${pathFiles[index]?.name || '路径'}`);
            }
        }

        // 显示路径信息
        function showPathInfo(index) {
            if (index >= 0 && index < pathFiles.length) {
                const path = pathFiles[index];
                const style = sportStyles[path.sportType];
                
                const infoContent = `
                    <div style="padding: 8px; max-width: 180px;">
                        <h3 style="font-weight: 600; color: #1f2937; margin-bottom: 4px;">${path.name}</h3>
                        <div style="display: flex; align-items: center; margin-bottom: 6px;">
                            <div style="width: 10px; height: 10px; border-radius: 50%; background-color: ${style.color}; margin-right: 4px;"></div>
                            <span style="font-size: 12px; font-weight: 500;">${path.info.type}</span>
                        </div>
                        <div style="font-size: 11px; color: #4b5563; line-height: 1.4;">
                            <p><span style="font-weight: 500;">开始时间:</span> ${path.info.time}</p>
                            <p><span style="font-weight: 500;">点数:</span> ${path.info.pointCount}</p>
                            <p><span style="font-weight: 500;">文件大小:</span> ${path.size}</p>
                        </div>
                    </div>
                `;
                
                const infoWindow = new AMap.InfoWindow({
                    content: infoContent,
                    offset: new AMap.Pixel(0, -30),
                    autoMove: true
                });
                
                if (path.data.length > 0) {
                    infoWindow.open(map, path.data[0]);
                }
            }
        }

        // 显示通知
        function showNotification(msg, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 12px;
                right: 12px;
                padding: 8px 12px;
                border-radius: 4px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                display: flex;
                align-items: center;
                z-index: 100;
                transition: all 0.3s ease;
                transform: translateY(0);
                opacity: 1;
            `;
            
            if (type === 'success') {
                notification.style.backgroundColor = '#10b981';
                notification.style.color = 'white';
                notification.innerHTML = `<span style="margin-right: 6px;">✓</span><span>${msg}</span>`;
            } else {
                notification.style.backgroundColor = '#ef4444';
                notification.style.color = 'white';
                notification.innerHTML = `<span style="margin-right: 6px;">!</span><span>${msg}</span>`;
            }
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateY(-20px)';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
